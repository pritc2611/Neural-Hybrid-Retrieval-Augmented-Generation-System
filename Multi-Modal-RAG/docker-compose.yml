services:
  rag_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag_application:latest
    container_name: rag_container
    ports:
      - "8000:8000"

    environment:
      EMBED_MODEL_PATH: /models/embeding_llm
      LLM_MODEL_PATH: /models/llm
      REDIS_HOST: redis_db
      MONGO_HOST: mongo_db

    volumes:
      - "D://llms//model//embeding_llm//clip_model:/models:ro"

    depends_on:
      - redis_db
      - mongo_db

    networks:
      - rag_network

    restart: unless-stopped

  redis_db:
    image: redis:latest
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_network

  mongo_db:
    image: mongo:latest
    container_name: mongo_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: ragdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - rag_network

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  rag_network:
    driver: bridge
