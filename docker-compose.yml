services:
  embedding:
    build:
    context: ./embed_service_model
    dockerfile: dockerfile
    container_name: embedding_service
    ports:
      - "8000:8000"
    networks:
      - rag-network

  ragapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag_service:latest
    container_name: rag_app
    ports:
      - "7000:7000"
    networks:
      - rag-network
    depends_on:
      - embedding

networks:
  rag-network:
    driver: bridge