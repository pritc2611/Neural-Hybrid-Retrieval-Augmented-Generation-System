name: Build & Push RAG System

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build embed service
      - name: Build embed_service image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/embed_service:latest ./embed_service_model

      - name: Push embed_service
        run: docker push ${{ secrets.DOCKER_USERNAME }}/embed_service:latest

      # Build rag service
      - name: Build rag_service image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/rag_service:latest .

      - name: Push rag_service
        run: docker push ${{ secrets.DOCKER_USERNAME }}/rag_service:latest